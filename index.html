<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiple Choice Quiz</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- <link rel="stylesheet" href="style.css"> -->
</head>
<body>
  <div class="container mt-5">
    <div id="player-input" class="d-none mb-4">
      <!-- Place the player name input here -->
    </div>
    <div id="quiz-container" class="card d-none">
      <div class="card-body">
        <h1 class="card-title text-center">Quiz</h1>
        <!-- Place the question, the options and the results here -->
        <div id="question-container" class="my-2">
        <!-- Question -->
        </div>
        <div id="results">
        <!-- Results -->
        </div>
      </div>
    </div>
    <div id="leaderboard" class="mt-5">
      <h2>Leaderboard</h2>
      <button id="reset-leaderboard-button" class="btn btn-outline-danger btn-sm mt-2">Reset Leaderboard</button>
      <!-- Place the leaderboard list here -->
       <div id="leaderboard-list">
        <!-- Leaderboard list-->
       </div>
    </div>
  </div>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
